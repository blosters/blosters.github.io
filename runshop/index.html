<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blosters — Applications Android</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f8f9fa;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 48px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            text-align: center;
        }
        .icon { font-size: 64px; margin-bottom: 16px; }
        h1 { font-size: 28px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
        .subtitle { font-size: 16px; color: #666; margin-bottom: 32px; }
        .app {
            background: #f0f4ff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            text-align: left;
        }
        .app-name { font-weight: 600; font-size: 17px; color: #1a1a2e; }
        .app-desc { font-size: 14px; color: #666; margin-top: 4px; }
        .contact { margin-top: 32px; font-size: 14px; color: #999; }
        .contact a { color: #4f7be9; text-decoration: none; }
        .btn-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 16px;
        }
        .btn-playstore, .btn-testers {
            display: inline-block;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 50px;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn-playstore {
            background: #1a1a2e;
            color: white;
        }
        .btn-playstore:hover { background: #2e2e50; }
        .btn-testers {
            background: #1DB954;
            color: white;
        }
        .btn-testers:hover { background: #17a348; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🛍️</div>
        <h1>Blosters</h1>
        <p class="subtitle">Développeur d'applications Android</p>

        <div class="app">
            <div class="app-name">Runshop — Liste de courses</div>
            <div class="app-desc">Application de liste de courses intelligente avec synchronisation en temps réel et apprentissage automatique.</div>
        </div>

        <div class="btn-row">
            <a class="btn-testers" href="https://groups.google.com/g/runshop-testers" target="_blank" rel="noopener">
                Rejoindre les testeurs 👥
            </a>
            <a class="btn-playstore" href="https://play.google.com/store/apps/details?id=com.blosters.runshop" target="_blank" rel="noopener">
                ▶ Télécharger sur Play Store
            </a>
        </div>

        <div class="contact">
            Contact : <a href="mailto:plague.allan@gmail.com">plague.allan@gmail.com</a>
        </div>
    </div>
</body>
</html>
